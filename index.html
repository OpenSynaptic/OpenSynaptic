layout: null

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSynaptic - Select Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 50px;
            line-height: 1.6;
        }
        
        .language-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .language-btn {
            display: inline-block;
            padding: 20px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 8px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            min-width: 150px;
        }
        
        .language-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .language-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .language-btn.primary:hover {
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        
        .flag {
            font-size: 2em;
            margin-right: 10px;
        }
        
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }
        
        .docs-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #f5f5f5;
            border-radius: 6px;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .docs-link:hover {
            background: #e8e8ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OpenSynaptic</h1>
        <p class="subtitle">
            2-N-2 High-Performance IoT Protocol Stack<br>
            <small>高性能物联网协议栈</small>
        </p>
        
        <div class="language-selector">
            <a href="README.md" class="language-btn primary">
                <span class="flag">🇬🇧</span>English
            </a>
            <a href="README.zh.md" class="language-btn">
                <span class="flag">🇨🇳</span>简体中文
            </a>
        </div>
        
        <p class="footer">
            Select your preferred language / 选择您偏好的语言
        </p>
        
        <a href="docs/README.md" class="docs-link">📚 Documentation Hub</a>
    </div>
</body>
</html>
