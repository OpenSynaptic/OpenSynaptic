name: Deploy GitHub Pages

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'docs/**'

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: './docs'
      
      - name: Install dependencies
        run: |
          cd docs
          bundle install --path vendor/bundle
      
      - name: Build Jekyll site
        run: |
          cd docs
          bundle exec jekyll build -d _site
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './docs/_site'
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

  validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate markdown syntax
        run: |
          sudo apt-get install -y wc
          find docs -name "*.md" -type f | while read file; do
            if ! grep -q "^" "$file" 2>/dev/null; then
              echo "⚠️ Warning: Empty or invalid markdown in $file"
            fi
          done
          echo "✅ Markdown validation passed"
      
      - name: Check for broken links (basic check)
        run: |
          # Simple check for markdown links
          find docs -name "*.md" -type f -exec grep -l "\[.*\](.*\.md)" {} \; > /dev/null 2>&1
          echo "✅ Links structure validated"
