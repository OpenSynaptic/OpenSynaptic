name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW_TAG="${{ github.ref_name }}"
            VERSION="${RAW_TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

  build-wheel:
    name: build-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [get-version]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel with maturin
        run: maturin build --release --out dist --interpreter python${{ matrix.python-version }}
        env:
          OPENSYNAPTIC_REQUIRE_RSCORE: "1"

      - name: Show built distributions
        run: |
          ls -lah dist
          python -c "import hashlib; from pathlib import Path; [print(f'{p.name}\tsha256={hashlib.sha256(p.read_bytes()).hexdigest()}') for p in Path('dist').glob('*') if p.is_file()]"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*
          
  build-sdist:
    name: build-sdist
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/opensynaptic-*.tar.gz

  collect-dist:
    name: collect-dist
    runs-on: ubuntu-latest
    needs: [build-wheel, build-sdist]
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Validate release distributions
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/opensynaptic-*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No opensynaptic distributions found in dist/" >&2
            ls -lah dist || true
            exit 1
          fi
          bad=(dist/*)
          for f in "${bad[@]}"; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            if [[ "$base" != opensynaptic-* ]]; then
              echo "Unexpected artifact: $base" >&2
              exit 1
            fi
          done
          ls -lah dist

      - name: Upload merged release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  github-release:
    needs: [collect-dist, get-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Show release artifacts
        run: ls -lah dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: v${{ needs.get-version.outputs.version }}
          files: dist/*

  publish-testpypi:
    needs: [collect-dist, get-version]
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Show downloaded distributions
        run: ls -lah dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false

  publish-pypi:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false
