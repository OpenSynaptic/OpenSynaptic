name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  build-rust-wheel:
    name: build-rust-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Rust wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: >-
            --release
            --manifest-path src/opensynaptic/core/rscore/rust/Cargo.toml
            --interpreter python${{ matrix.python-version }}
            --out dist

      - name: Upload Rust wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  github-release:
    needs: [build-rust-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download rust wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-wheel-*
          merge-multiple: true
          path: dist

      - name: Show release artifacts
        run: ls -lah dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-testpypi:
    needs: [build-rust-wheel]
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download rust wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-wheel-*
          merge-multiple: true
          path: dist

      - name: Show downloaded distributions
        run: ls -lah dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false

  publish-pypi:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download rust wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false

