name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish (e.g. v1.3.0)'
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag, version, and release notes
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or v1.2.3rc1"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::Remote tag ${TAG} does not exist on origin. Create and push the tag before running the release workflow."
              exit 1
            fi
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            git checkout --detach "refs/tags/${TAG}"
          fi

          VERSION="${TAG#v}"
          SOURCE_REF="${TAG}"
          NOTES="RELEASE_NOTES_v${VERSION}.md"
          PYPROJECT_VERSION="$(grep -Po '^version = "\K[^"]+' pyproject.toml | head -n1)"

          if [[ -z "$PYPROJECT_VERSION" ]]; then
            echo "::error::Unable to read project version from pyproject.toml"
            exit 1
          fi

          if [[ "$PYPROJECT_VERSION" != "$VERSION" ]]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag version ($VERSION)"
            exit 1
          fi

          if [[ ! -f "$NOTES" ]]; then
            echo "::error::Missing release notes file: $NOTES"
            exit 1
          fi

          PRERELEASE=false
          if [[ "$TAG" == *rc* || "$TAG" == *alpha* || "$TAG" == *beta* ]]; then
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "release_notes=$NOTES" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-user-wheel:
    name: build-user-wheel (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    needs: [resolve-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs_linux: "x86_64"
            cibw_build: "cp311-* cp312-* cp313-*"
            artifact_suffix: "linux-x86_64"
            smoke_python_version: "3.13"
            smoke_wheel_tag: "cp313"
          - os: ubuntu-latest
            cibw_archs_linux: "aarch64"
            cibw_build: "cp311-*"
            artifact_suffix: "linux-aarch64"
            smoke_python_version: "3.11"
            smoke_wheel_tag: "cp311"
          - os: windows-latest
            cibw_archs_windows: "AMD64"
            cibw_build: "cp311-* cp312-* cp313-*"
            artifact_suffix: "windows-amd64"
            smoke_python_version: "3.13"
            smoke_wheel_tag: "cp313"
          - os: macos-latest
            cibw_archs_macos: "x86_64"
            cibw_build: "cp311-*"
            artifact_suffix: "macos-x86_64"
            smoke_python_version: "3.11"
            smoke_wheel_tag: "cp311"
          - os: macos-latest
            cibw_archs_macos: "arm64"
            cibw_build: "cp311-* cp312-* cp313-*"
            artifact_suffix: "macos-arm64"
            smoke_python_version: "3.13"
            smoke_wheel_tag: "cp313"
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - name: Setup QEMU for Linux ARM emulation
        if: runner.os == 'Linux' && matrix.cibw_archs_linux == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Verify checkout and maturin config
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD
          git describe --tags --exact-match
          sed -n '1,140p' pyproject.toml
          if ! grep -q "python-source = \"src\"" pyproject.toml; then
            echo "Expected python-source=\"src\" for release wheel build"
            exit 1
          fi
          if ! grep -q "python-packages = \[\"opensynaptic\", \"opensynaptic_rscore\"\]" pyproject.toml; then
            echo "Expected python-packages to include opensynaptic and opensynaptic_rscore"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.smoke_python_version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build user wheels
        run: cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          CIBW_BEFORE_ALL: "pip install maturin cffi"
          CIBW_BEFORE_ALL_WINDOWS: "pip install maturin cffi"
          CIBW_BEFORE_ALL_MACOS: "pip install maturin cffi && rustup target add x86_64-apple-darwin aarch64-apple-darwin"
          CIBW_BEFORE_BUILD: "python -m pip install cffi && python {project}/src/opensynaptic/utils/c/build_native.py"
          CIBW_ENVIRONMENT: "OPENSYNAPTIC_REQUIRE_RSCORE=1 CARGO_TARGET_DIR=target/rscore MATURIN_PEP517_ARGS='--bindings pyo3 --features python-module'"
          CIBW_ENVIRONMENT_MACOS: "OPENSYNAPTIC_REQUIRE_RSCORE=1 CARGO_TARGET_DIR=target/rscore MACOSX_DEPLOYMENT_TARGET=10.12 MATURIN_PEP517_ARGS='--bindings pyo3 --features python-module'"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014

      - name: Smoke-test built wheel (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERIFY_ROOT="${RUNNER_TEMP}/opensynaptic-wheel-smoke"
          WHEEL="$(ls dist/opensynaptic-*-${{ matrix.smoke_wheel_tag }}-*.whl | head -n 1 || true)"

          if [[ -z "$WHEEL" ]]; then
            echo "::error::No wheel found for smoke tag ${{ matrix.smoke_wheel_tag }}"
            exit 1
          fi

          rm -rf "$VERIFY_ROOT"
          mkdir -p "$VERIFY_ROOT/home" "$VERIFY_ROOT/work"
          export HOME="$VERIFY_ROOT/home"
          export PYTHONNOUSERSITE=1
          export OPENSYNAPTIC_AUTO_BUILD_NATIVE=0
          export OPENSYNAPTIC_AUTO_NATIVE_REPAIR=0
          unset PYTHONPATH || true

          python -m venv "$VERIFY_ROOT/venv"
          "$VERIFY_ROOT/venv/bin/pip" install --upgrade pip
          INSTALL_LOG="$VERIFY_ROOT/pip-install.log"
          if ! "$VERIFY_ROOT/venv/bin/pip" install "$WHEEL" >"$INSTALL_LOG" 2>&1; then
            cat "$INSTALL_LOG"
            if grep -q "not a supported wheel on this platform" "$INSTALL_LOG"; then
              echo "::notice::Skipping runtime smoke test for cross-arch wheel $WHEEL on the current runner/interpreter."
              exit 0
            fi
            echo "::error::Wheel install failed for $WHEEL"
            exit 1
          fi
          cat "$INSTALL_LOG"

          pushd "$VERIFY_ROOT/work"
          PYCODE="from importlib.metadata import version; import os, opensynaptic, opensynaptic_rscore; from opensynaptic.utils.paths import get_lib_path, get_user_config_path; from opensynaptic.utils.c.native_loader import has_native_library; print('PKG_VERSION=' + version('opensynaptic')); print('PKG_FILE=' + opensynaptic.__file__); print('RSCORE_FILE=' + opensynaptic_rscore.__file__); print('USER_CONFIG=' + get_user_config_path()); print('LIB_OS_SYMBOLS=' + get_lib_path('OS_Symbols.json')); print('HAS_OS_BASE62=' + str(has_native_library('os_base62'))); print('HAS_OS_SECURITY=' + str(has_native_library('os_security'))); assert 'site-packages' in opensynaptic.__file__; assert 'site-packages' in opensynaptic_rscore.__file__; assert os.path.exists(get_lib_path('OS_Symbols.json')); assert has_native_library('os_base62'); assert has_native_library('os_security')"
          "$VERIFY_ROOT/venv/bin/python" -c "$PYCODE"
          "$VERIFY_ROOT/venv/bin/os-node" repair-config --json
          "$VERIFY_ROOT/venv/bin/os-node" --no-wizard snapshot
          popd

      - name: Smoke-test built wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $verifyRoot = Join-Path $env:RUNNER_TEMP 'opensynaptic-wheel-smoke'
          $homeDir = Join-Path $verifyRoot 'home'
          $workDir = Join-Path $verifyRoot 'work'
          $venvDir = Join-Path $verifyRoot 'venv'
          $wheel = Get-ChildItem "dist/opensynaptic-*-${{ matrix.smoke_wheel_tag }}-*.whl" | Select-Object -First 1
          if (-not $wheel) {
            throw 'No compatible wheel found for smoke test.'
          }

          Remove-Item $verifyRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $homeDir,$workDir -Force | Out-Null

          python -m venv $venvDir
          & "$venvDir\Scripts\python.exe" -m pip install --upgrade pip
          & "$venvDir\Scripts\python.exe" -m pip install $wheel.FullName

          $oldUserProfile = $env:USERPROFILE
          $oldHome = $env:HOME
          $oldUsersite = $env:PYTHONNOUSERSITE
          $oldAutoBuild = $env:OPENSYNAPTIC_AUTO_BUILD_NATIVE
          $oldAutoRepair = $env:OPENSYNAPTIC_AUTO_NATIVE_REPAIR
          $hadPythonPath = Test-Path Env:PYTHONPATH
          if ($hadPythonPath) {
            $oldPythonPath = $env:PYTHONPATH
          }

          $env:USERPROFILE = $homeDir
          $env:HOME = $homeDir
          $env:PYTHONNOUSERSITE = '1'
          $env:OPENSYNAPTIC_AUTO_BUILD_NATIVE = '0'
          $env:OPENSYNAPTIC_AUTO_NATIVE_REPAIR = '0'
          Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue

          Push-Location $workDir
          try {
            $code = "from importlib.metadata import version; import os, opensynaptic, opensynaptic_rscore; from opensynaptic.utils.paths import get_lib_path, get_user_config_path; from opensynaptic.utils.c.native_loader import has_native_library; print('PKG_VERSION=' + version('opensynaptic')); print('PKG_FILE=' + opensynaptic.__file__); print('RSCORE_FILE=' + opensynaptic_rscore.__file__); print('USER_CONFIG=' + get_user_config_path()); print('LIB_OS_SYMBOLS=' + get_lib_path('OS_Symbols.json')); print('HAS_OS_BASE62=' + str(has_native_library('os_base62'))); print('HAS_OS_SECURITY=' + str(has_native_library('os_security'))); assert 'site-packages' in opensynaptic.__file__.lower(); assert 'site-packages' in opensynaptic_rscore.__file__.lower(); assert os.path.exists(get_lib_path('OS_Symbols.json')); assert has_native_library('os_base62'); assert has_native_library('os_security')"
            & "$venvDir\Scripts\python.exe" -c $code
            & "$venvDir\Scripts\os-node.exe" repair-config --json
            & "$venvDir\Scripts\os-node.exe" --no-wizard snapshot
          }
          finally {
            Pop-Location
            $env:USERPROFILE = $oldUserProfile
            $env:HOME = $oldHome
            if ($null -ne $oldUsersite) {
              $env:PYTHONNOUSERSITE = $oldUsersite
            }
            else {
              Remove-Item Env:PYTHONNOUSERSITE -ErrorAction SilentlyContinue
            }
            if ($null -ne $oldAutoBuild) {
              $env:OPENSYNAPTIC_AUTO_BUILD_NATIVE = $oldAutoBuild
            }
            else {
              Remove-Item Env:OPENSYNAPTIC_AUTO_BUILD_NATIVE -ErrorAction SilentlyContinue
            }
            if ($null -ne $oldAutoRepair) {
              $env:OPENSYNAPTIC_AUTO_NATIVE_REPAIR = $oldAutoRepair
            }
            else {
              Remove-Item Env:OPENSYNAPTIC_AUTO_NATIVE_REPAIR -ErrorAction SilentlyContinue
            }
            if ($hadPythonPath) {
              $env:PYTHONPATH = $oldPythonPath
            }
            else {
              Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
            }
          }

      - name: Upload user wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-user-wheel-${{ matrix.artifact_suffix }}
          path: dist/*.whl
          if-no-files-found: error

  build-user-sdist:
    name: build-user-sdist
    runs-on: ubuntu-latest
    needs: [resolve-release]
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: pip install maturin build

      - name: Build user sdist
        run: python -m build --sdist --outdir ${{ github.workspace }}/dist

      - name: Verify sdist exists
        shell: bash
        run: |
          set -euo pipefail
          ls -la "${{ github.workspace }}/dist/"
          EXPECTED="${{ github.workspace }}/dist/opensynaptic-${{ needs.resolve-release.outputs.version }}.tar.gz"
          if [[ ! -f "$EXPECTED" ]]; then
            echo "::error::Expected sdist not found: $EXPECTED"
            exit 1
          fi

      - name: Upload user sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-user-sdist
          path: ${{ github.workspace }}/dist/*.tar.gz
          if-no-files-found: error

  verify-user-distributions:
    name: verify-user-distributions
    runs-on: ubuntu-latest
    needs: [resolve-release, build-user-wheel, build-user-sdist]
    steps:
      - name: Download user wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-user-wheel-*
          path: release-user-wheels
          merge-multiple: true

      - name: Download user sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-user-sdist
          path: release-user-sdist

      - name: Verify user distribution boundaries
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-user-wheels
          ls -la release-user-sdist

          if ls release-user-wheels/opensynaptic_rscore-* 1>/dev/null 2>&1; then
            echo "::error::Unexpected opensynaptic_rscore artifact found in wheel release set"
            exit 1
          fi

          if ! ls release-user-wheels/opensynaptic-*.whl 1>/dev/null 2>&1; then
            echo "::error::No opensynaptic wheel artifacts found"
            exit 1
          fi

          if ! ls release-user-sdist/opensynaptic-${{ needs.resolve-release.outputs.version }}.tar.gz 1>/dev/null 2>&1; then
            echo "::error::Expected user sdist missing"
            exit 1
          fi

          mkdir -p release-pypi-dist
          cp release-user-wheels/*.whl release-pypi-dist/
          cp release-user-sdist/*.tar.gz release-pypi-dist/

      - name: Check PyPI distributions with twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade twine pkginfo packaging readme-renderer
          twine check release-pypi-dist/*

      - name: Upload combined PyPI distribution set
        uses: actions/upload-artifact@v4
        with:
          name: release-pypi-dist
          path: release-pypi-dist/*
          if-no-files-found: error

  build-developer-bundle:
    name: build-developer-bundle
    runs-on: ubuntu-latest
    needs: [resolve-release]
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - name: Build developer bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve-release.outputs.version }}"
          ROOT="devkit/opensynaptic-dev-${VERSION}"
          mkdir -p "$ROOT"

          required_dirs=(src scripts tests libraries)
          required_files=(README.md README.zh.md LICENSE pyproject.toml Config.json run-main.cmd run-main.sh)

          for path in "${required_dirs[@]}"; do
            if [[ ! -d "$path" ]]; then
              echo "::error::Missing required developer bundle directory: $path"
              exit 1
            fi
            cp -a "$path" "$ROOT/"
          done

          if [[ ! -d .github/workflows ]]; then
            echo "::error::Missing required workflow directory: .github/workflows"
            exit 1
          fi
          cp -a .github/workflows "$ROOT/.github_workflows"

          for path in "${required_files[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "::error::Missing required developer bundle file: $path"
              exit 1
            fi
          done
          cp -a "${required_files[@]}" "$ROOT/"

          optional_paths=(
            docs
            OpenSynaptic_Wiki
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            SECURITY.md
            RELEASE_NOTES_v${VERSION}.md
            TEST_REPORT_v${VERSION}.md
            TEST_COVERAGE.md
            GITHUB_PAGES_GUIDE.md
            MIGRATION_REPORT.md
            TRANSLATION_QA_REPORT.md
            WIKI_OPTIMIZATION_REPORT.md
            index.html
            _config.yml
          )

          for path in "${optional_paths[@]}"; do
            if [[ -e "$path" ]]; then
              cp -a "$path" "$ROOT/"
            fi
          done

          cat > "$ROOT/DEVKIT_README.txt" << 'EOF'
          OpenSynaptic Developer Bundle

          This bundle is for developers who want source-level debugging, local CI reproduction,
          plugin development, and running validation scripts.

          Quick start:
          1. Create and activate a Python 3.11+ environment
          2. Install editable with dev extras: pip install -e .[dev]
          3. Run scripts in scripts/ and tests in tests/

          Notes:
          - User wheels are the direct-install runtime artifacts for supported platforms.
          - The user sdist is for intentional source builds and downstream packagers.
          - This developer bundle is for source workflows and must not be uploaded to PyPI.
          - Documentation-like paths are included when present in the tagged source; some releases keep long-form docs in the Wiki/site repository instead of a top-level docs/ directory.
          EOF

          mkdir -p dev-dist
          tar -czf "dev-dist/opensynaptic-dev-${VERSION}.tar.gz" -C devkit "opensynaptic-dev-${VERSION}"
          sha256sum "dev-dist/opensynaptic-dev-${VERSION}.tar.gz" > "dev-dist/opensynaptic-dev-${VERSION}.tar.gz.sha256"

      - name: Upload developer bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-developer-bundle
          path: dev-dist/*
          if-no-files-found: error

  github-release:
    name: github-release
    needs: [resolve-release, verify-user-distributions, build-developer-bundle]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.source_ref }}

      - name: Download release PyPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-pypi-dist
          path: release-assets/pypi-dist

      - name: Download developer bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-developer-bundle
          path: release-assets/developer-bundle

      - name: Build GitHub Release body
        shell: bash
        run: |
          set -euo pipefail
          NOTES="${{ needs.resolve-release.outputs.release_notes }}"
          cat > RELEASE_BODY.md <<EOF
          ## Release Asset Boundaries

          - User wheels: prebuilt runtime packages for direct pip install on the supported release platforms.
          - User sdist: source distribution for downstream packagers or intentional source builds; requires local Rust/C build toolchains.
          - Developer bundle: source/debug/CI reproduction archive; not a PyPI artifact and not intended for end-user installation.

          ---

          EOF
          cat "$NOTES" >> RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          name: OpenSynaptic ${{ needs.resolve-release.outputs.tag }}
          body_path: RELEASE_BODY.md
          prerelease: ${{ needs.resolve-release.outputs.prerelease == 'true' }}
          overwrite_files: true
          files: |
            release-assets/pypi-dist/*
            release-assets/developer-bundle/*

  publish-testpypi:
    name: publish-testpypi
    needs: [resolve-release, verify-user-distributions, github-release]
    runs-on: ubuntu-latest
    environment: testpypi
    continue-on-error: true
    steps:
      - name: Download release PyPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-pypi-dist
          path: release-pypi-dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: release-pypi-dist
          skip-existing: true
          verbose: true

  publish-pypi:
    name: publish-pypi
    needs: [resolve-release, verify-user-distributions, github-release]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download release PyPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-pypi-dist
          path: release-pypi-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: release-pypi-dist
          skip-existing: true
          verbose: true
