name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  build-python-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify tag matches pyproject version
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          raw_tag = os.environ.get('GITHUB_REF_NAME', '')
          if not raw_tag.startswith('v'):
              raise SystemExit(f"Expected a v-prefixed tag, got: {raw_tag}")

          def norm(v: str) -> str:
              s = v.strip().lower()
              s = re.sub(r'[-_]?rc', 'rc', s)
              return s

          tag_version = norm(raw_tag[1:])
          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          project_version = norm(str(pyproject['project']['version']))

          if tag_version != project_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={raw_tag} -> {tag_version}, pyproject={project_version}"
              )
          print(f"Tag/version check passed: {raw_tag} == {pyproject['project']['version']}")
          PY

      - name: Build sdist and wheel
        run: |
          python -m pip install -U pip build twine
          rm -rf dist
          python -m build
          python -m twine check dist/*

      - name: Show built distributions
        run: |
          ls -lah dist
          python - <<'PY'
          import hashlib
          from pathlib import Path
          for p in sorted(Path('dist').glob('*')):
              if p.is_file():
                  h = hashlib.sha256(p.read_bytes()).hexdigest()
                  print(f"{p.name}\tsha256={h}")
          PY

      - name: Upload python dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  github-release:
    needs: [build-python-dist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-testpypi:
    needs: [build-python-dist]
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Show downloaded distributions
        run: ls -lah dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false

  publish-pypi:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false

