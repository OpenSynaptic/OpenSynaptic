name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract version
        id: extract
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            RAW_TAG="${{ github.ref_name }}"
            VERSION="${RAW_TAG#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-wheel:
    name: build-wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [get-version]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout and maturin config
        shell: bash
        run: |
          git rev-parse HEAD
          git --no-pager log -1 --oneline
          echo "=== root pyproject (head) ==="
          sed -n '1,140p' pyproject.toml
          echo "=== rust pyproject (head) ==="
          sed -n '1,140p' src/opensynaptic/core/rscore/rust/pyproject.toml
          if grep -RIn "python-source" pyproject.toml src/opensynaptic/core/rscore/rust/pyproject.toml; then
            echo "Unexpected python-source found in active commit"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_ARCHS: auto64
          CIBW_BEFORE_ALL: "pip install maturin"
          CIBW_ENVIRONMENT: "OPENSYNAPTIC_REQUIRE_RSCORE=1"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: build-sdist
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        run: python -m build --sdist --outdir ${{ github.workspace }}/dist
      - name: Verify sdist exists
        run: |
          ls -la ${{ github.workspace }}/dist/
          if [ ! -f ${{ github.workspace }}/dist/*.tar.gz ]; then
            echo "sdist not found in ${{ github.workspace }}/dist/"
            exit 1
          fi
          echo "sdist found"
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ${{ github.workspace }}/dist/*.tar.gz
          if-no-files-found: error

  collect-dist:
    runs-on: ubuntu-latest
    needs: [build-wheel, build-sdist]
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Upload merged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

      - name: Assert package set is opensynaptic only
        shell: bash
        run: |
          ls -la dist
          if ls dist/opensynaptic_rscore-* 1>/dev/null 2>&1; then
            echo "Unexpected opensynaptic_rscore artifact found in release-dist"
            exit 1
          fi
          if ! ls dist/opensynaptic-* 1>/dev/null 2>&1; then
            echo "No opensynaptic artifacts found in release-dist"
            exit 1
          fi

  github-release:
    needs: [collect-dist, get-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          files: dist/*

  publish-testpypi:
    needs: [collect-dist, get-version]
    runs-on: ubuntu-latest
    environment: testpypi
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true

  publish-pypi:
    needs: [collect-dist, get-version]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - name: Check distributions with twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade twine pkginfo packaging readme-renderer
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true
          verbose: true
