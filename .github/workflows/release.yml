name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write   # required for creating GitHub Releases and uploading assets

jobs:
  # -------------------------------------------------------------------------
  # 1. Verify: version tag must match library.properties and CMakeLists.txt
  # -------------------------------------------------------------------------
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract tag version
        id: extract
        run: |
          # workflow_dispatch supplies the tag via inputs; tag-push uses GITHUB_REF_NAME
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VER="${TAG#v}"                     # e.g. 1.0.0
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VER"

      - name: Check library.properties
        run: |
          VER="${{ steps.extract.outputs.version }}"
          PROP_VER=$(grep -E "^version=" library.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "library.properties version: $PROP_VER"
          if [ "$PROP_VER" != "$VER" ]; then
            echo "::error::library.properties version ($PROP_VER) does not match tag ($VER)"
            exit 1
          fi

      - name: Check CMakeLists.txt
        run: |
          VER="${{ steps.extract.outputs.version }}"
          CMAKE_VER=$(grep -oP 'project\(osrx\s+VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "CMakeLists.txt version: $CMAKE_VER"
          if [ "$CMAKE_VER" != "$VER" ]; then
            echo "::error::CMakeLists.txt version ($CMAKE_VER) does not match tag ($VER)"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # 2. Full CI sanity check before packaging
  # -------------------------------------------------------------------------
  ci-check:
    name: CI sanity check
    needs: verify-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: CMake build + tests (GCC, strict C89)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-std=c89 -pedantic -Wall -Wextra -Werror" \
            -DOSRX_BUILD_TESTS=ON \
            -DOSRX_BUILD_EXAMPLES=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=/usr/local/bin sh

      - name: Arduino compile check
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          mkdir -p ~/Arduino/libraries
          ln -s "$GITHUB_WORKSPACE" ~/Arduino/libraries/OSynaptic-RX
          arduino-cli compile --fqbn arduino:avr:uno examples/BasicRX

  # -------------------------------------------------------------------------
  # 3. Package — produce Arduino-compatible zip and source tarball
  # -------------------------------------------------------------------------
  package:
    name: Package release artifacts
    needs: [verify-version, ci-check]
    runs-on: ubuntu-22.04
    outputs:
      zip_name: ${{ steps.pack.outputs.zip_name }}
      tar_name: ${{ steps.pack.outputs.tar_name }}
      cmake_x64_name: ${{ steps.cmake_x64.outputs.cmake_x64_name }}
      cmake_arm64_name: ${{ steps.cmake_arm64.outputs.cmake_arm64_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build Arduino zip
        id: pack
        run: |
          VER="${{ needs.verify-version.outputs.version }}"
          LIB_NAME="OSynaptic-RX"
          ZIP_NAME="${LIB_NAME}-${VER}.zip"
          TAR_NAME="${LIB_NAME}-${VER}.tar.gz"

          mkdir -p /tmp/pkg/${LIB_NAME}
          rsync -a \
            --exclude='.git' \
            --exclude='build/' \
            --exclude='.github/' \
            . /tmp/pkg/${LIB_NAME}/

          cd /tmp/pkg
          zip -r "${ZIP_NAME}" "${LIB_NAME}/"
          tar -czf "${TAR_NAME}" "${LIB_NAME}/"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "tar_name=${TAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ZIP_NAME} ($(du -sh /tmp/pkg/${ZIP_NAME} | cut -f1))"
          echo "Packaged: ${TAR_NAME} ($(du -sh /tmp/pkg/${TAR_NAME} | cut -f1))"

      - name: Build CMake install package (Linux x86_64)
        id: cmake_x64
        run: |
          VER="${{ needs.verify-version.outputs.version }}"
          LIB_NAME="OSynaptic-RX"
          CMAKE_NAME="${LIB_NAME}-${VER}-cmake-linux-x86_64.tar.gz"

          cmake -S . -B /tmp/cmake_build_x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/cmake_install_x64 \
            -DOSRX_BUILD_EXAMPLES=OFF \
            -DOSRX_BUILD_TESTS=OFF
          cmake --build /tmp/cmake_build_x64 --parallel
          cmake --install /tmp/cmake_build_x64 --prefix /tmp/cmake_install_x64

          cd /tmp && tar -czf "${CMAKE_NAME}" cmake_install_x64/
          echo "cmake_x64_name=${CMAKE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${CMAKE_NAME}"

      - name: Build CMake install package (Linux aarch64 cross)
        id: cmake_arm64
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          VER="${{ needs.verify-version.outputs.version }}"
          LIB_NAME="OSynaptic-RX"
          CMAKE_NAME="${LIB_NAME}-${VER}-cmake-linux-aarch64.tar.gz"

          cat > /tmp/aarch64-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

          cmake -S . -B /tmp/cmake_build_arm64 \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/aarch64-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/cmake_install_arm64 \
            -DOSRX_BUILD_EXAMPLES=OFF \
            -DOSRX_BUILD_TESTS=OFF
          cmake --build /tmp/cmake_build_arm64 --parallel
          cmake --install /tmp/cmake_build_arm64 --prefix /tmp/cmake_install_arm64

          cd /tmp && tar -czf "${CMAKE_NAME}" cmake_install_arm64/
          echo "cmake_arm64_name=${CMAKE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${CMAKE_NAME}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: arduino-zip
          path: /tmp/pkg/${{ steps.pack.outputs.zip_name }}
          retention-days: 7

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: /tmp/pkg/${{ steps.pack.outputs.tar_name }}
          retention-days: 7

      - name: Upload cmake x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmake-x64
          path: /tmp/${{ steps.cmake_x64.outputs.cmake_x64_name }}
          retention-days: 7

      - name: Upload cmake aarch64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmake-arm64
          path: /tmp/${{ steps.cmake_arm64.outputs.cmake_arm64_name }}
          retention-days: 7

  # -------------------------------------------------------------------------
  # 4. Create GitHub Release and upload assets
  # -------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [verify-version, package]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: arduino-zip
          path: dist/

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: dist/

      - name: Download cmake x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cmake-x64
          path: dist/

      - name: Download cmake aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cmake-arm64
          path: dist/

      - name: Extract release notes for this version
        id: notes
        run: |
          VER="${{ needs.verify-version.outputs.version }}"
          NOTES=$(awk "/^## v${VER}/{found=1; next} found && /^## v/{exit} found{print}" \
                  RELEASE_NOTES_v${VER}.md 2>/dev/null \
                  || awk "/^## v${VER}/{found=1; next} found && /^## v/{exit} found{print}" \
                  RELEASE_NOTES_v1.0.0.md 2>/dev/null \
                  || echo "See RELEASE_NOTES for details.")
          echo "$NOTES" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OSynaptic-RX v${{ needs.verify-version.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/${{ needs.package.outputs.zip_name }}
            dist/${{ needs.package.outputs.tar_name }}
            dist/${{ needs.package.outputs.cmake_x64_name }}
            dist/${{ needs.package.outputs.cmake_arm64_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
