name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      OPENSYNAPTIC_CORE: pycore
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: |
          PROJECT_ROOT=$(pwd)
          cd src/opensynaptic/core/rscore/rust
          mkdir -p "$PROJECT_ROOT/opensynaptic/utils/c/bin"
          maturin build --release --out "$PROJECT_ROOT/opensynaptic/utils/c/bin"
          cd "$PROJECT_ROOT"
          
          echo "=== Rust extension files ==="
          ls -la opensynaptic/utils/c/bin/
        shell: bash

      - name: Install package
        run: |
          python -m pip install -U pip
          
          # 安装 Rust wheel
          echo "Installing Rust wheel..."
          pip install opensynaptic/utils/c/bin/*.whl
          
          # 安装主包
          echo "Installing main package..."
          pip install .[dev]

      - name: Verify installation
        run: |
          echo "=== Installed packages ==="
          pip list | grep -E "(opensynaptic|rscore)"
          
          echo "=== Import test ==="
          python << 'EOF'
          # 测试主包导入
          try:
              import opensynaptic
              print("✅ OpenSynaptic imported")
          except Exception as e:
              print(f"❌ OpenSynaptic import failed: {e}")
          
          # 测试 Rust 扩展导入
          try:
              import opensynaptic_rscore
              print("✅ Rust extension imported as opensynaptic_rscore")
              print(f"   Location: {opensynaptic_rscore.__file__}")
          except Exception as e:
              print(f"❌ opensynaptic_rscore import failed: {e}")
          
          # 测试 has_rs_native 函数
          try:
              from opensynaptic_rscore import has_rs_native
              print(f"✅ has_rs_native: {has_rs_native()}")
          except Exception as e:
              print(f"❌ has_rs_native import failed: {e}")
          
          # 检查是否可以从 opensynaptic.core.rscore 导入（如果项目需要）
          try:
              # 尝试创建命名空间包结构
              import opensynaptic
              import opensynaptic.core
              import opensynaptic.core.rscore
              print("✅ opensynaptic.core.rscore namespace exists")
          except ImportError:
              print("⚠️  opensynaptic.core.rscore not found (this may be expected)")
          EOF

      - name: Run unit and integration tests with coverage
        run: |
          pytest --cov=opensynaptic --cov-report=xml --cov-report=term tests

      - name: Run component smoke suite (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -u src/main.py plugin-test --suite component

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-python-dist:
    name: build-python-dist (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist/wheel and validate metadata
        run: |
          python -m pip install -U pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-py${{ matrix.python-version }}
          path: dist/*

  build-rust-wheel:
    name: build-rust-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Rust wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: >-
            --release
            --manifest-path src/opensynaptic/core/rscore/rust/Cargo.toml
            --interpreter python${{ matrix.python-version }}
            --out dist

      - name: Upload Rust wheel
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
