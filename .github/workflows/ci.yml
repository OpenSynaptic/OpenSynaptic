name: CI


on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      scale:
        description: "Validation pipeline scale (ubuntu-latest/py3.11 shard only)"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - full
          - extreme
      random_rounds:
        description: "Rounds for randomized protocol e2e (ubuntu-latest/py3.11 shard only)"
        required: false
        default: "20"
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    env:
      OPENSYNAPTIC_CORE: pycore
      PYTHONPATH: ${{ github.workspace }}/src
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rscore
    strategy:
      fail-fast: false
      matrix:
        # Platforms: Linux x86_64, Linux ARM64, macOS Apple Silicon, Windows x86_64
        # macOS Intel (x86_64) is covered by build.yml cibuildwheel cross-compile.
        # macos-13 runner was deprecated by GitHub in 2025.
        # Windows ARM is intentionally excluded.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        # PyO3 0.23.x supports up to Python 3.13.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/rscore
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/opensynaptic/core/rscore/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install maturin
        run: pip install maturin cffi

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Pin Rust linker to MSVC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $linkPath = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64\link.exe'
          if (!(Test-Path $linkPath)) {
            throw "MSVC linker not found at: $linkPath"
          }
          if ($linkPath -like '*Git\\usr\\bin\\link.exe') {
            throw "Resolved linker points to Git link.exe: $linkPath"
          }
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Pinned linker: $linkPath"

      - name: Build Rust extension (Unix)
        if: runner.os != 'Windows'
        run: |
          PROJECT_ROOT=$(pwd)
          cd src/opensynaptic/core/rscore/rust
          mkdir -p "$PROJECT_ROOT/dist"
          maturin build --release --bindings pyo3 --features python-module --out "$PROJECT_ROOT/dist"
          cd "$PROJECT_ROOT"
          
          echo "=== Rust extension files ==="
          ls -la dist/
        shell: bash

      - name: Build Rust extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $projectRoot = (Get-Location).Path
          Set-Location 'src/opensynaptic/core/rscore/rust'
          New-Item -ItemType Directory -Path "$projectRoot/dist" -Force | Out-Null
          maturin build --release --bindings pyo3 --features python-module --out "$projectRoot/dist"
          Set-Location $projectRoot

          Write-Host '=== Rust extension files ==='
          Get-ChildItem -Force "$projectRoot/dist"

      - name: Install package
        run: |
          python -m pip install -U pip
          
          # Install Rust wheel built in the previous step.
          echo "Installing Rust wheel..."
          pip install dist/*.whl
          
          # Editable install keeps imports stable from src layout in CI.
          echo "Installing main package..."
          pip install -e ".[dev]"

      - name: Verify installation
        run: |
          echo "=== Installed packages ==="
          python -c "from importlib.metadata import version; print('opensynaptic', version('opensynaptic')); print('opensynaptic-rscore', version('opensynaptic-rscore'))"
          
          echo "=== Import test ==="
          python -c "import opensynaptic, opensynaptic.core, opensynaptic_rscore; print('opensynaptic:', opensynaptic.__file__); print('opensynaptic_rscore:', opensynaptic_rscore.__file__)"

      - name: Build native C runtime libraries
        run: |
          python -u src/opensynaptic/utils/c/check_native_toolchain.py
          python -u src/opensynaptic/utils/c/build_native.py
          python -c "from pathlib import Path; import sys; ext = '.dll' if sys.platform.startswith('win') else ('.dylib' if sys.platform == 'darwin' else '.so'); base = Path('src/opensynaptic/utils/c/bin'); required = [base / f'os_base62{ext}', base / f'os_security{ext}']; missing = [str(p) for p in required if not p.exists()]; print('native outputs:', ', '.join(str(p) for p in required)); sys.exit(f'Missing native outputs: {missing}') if missing else None"

      - name: Run unit and integration tests with coverage
        run: |
          python -m pytest --cov=opensynaptic --cov-report=xml --cov-report=term tests

      - name: Run component smoke suite (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -u src/main.py plugin-test --suite component

      - name: Run exhaustive test suites (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -u scripts/exhaustive_business_logic.py
          python -u scripts/exhaustive_plugin_test.py
          python -u scripts/exhaustive_security_infra_test.py
          python -u scripts/exhaustive_orthogonal_test.py

      - name: Resolve pipeline inputs (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.scale }}" ]]; then
            echo "PIPELINE_SCALE=${{ github.event.inputs.scale }}" >> "$GITHUB_ENV"
          else
            echo "PIPELINE_SCALE=smoke" >> "$GITHUB_ENV"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.random_rounds }}" ]]; then
            echo "RANDOM_ROUNDS=${{ github.event.inputs.random_rounds }}" >> "$GITHUB_ENV"
          else
            echo "RANDOM_ROUNDS=20" >> "$GITHUB_ENV"
          fi

      - name: Script - integration_test (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: timeout 15m python -u scripts/integration_test.py

      - name: Script - udp_receive_test (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          timeout 5m python -u scripts/udp_receive_test.py \
            --protocol udp \
            --host 127.0.0.1 \
            --port 18080 \
            --config Config.json \
            --once \
            --timeout 0.5

      - name: Script - audit_driver_capabilities (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: timeout 15m python -u scripts/audit_driver_capabilities.py

      - name: Script - cli_exhaustive_check (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: timeout 40m python -u scripts/cli_exhaustive_check.py

      - name: Script - protocol_matrix_exhaustive (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          timeout 20m python -u scripts/protocol_matrix_exhaustive.py \
            --host 127.0.0.1 \
            --base-port 21080 \
            --timeout 1.2 \
            --output data/benchmarks/protocol_matrix_exhaustive_ci.json

      - name: Script - random_registration_protocol_e2e (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          timeout 20m python -u scripts/random_registration_protocol_e2e.py \
            --rounds "$RANDOM_ROUNDS" \
            --seed 202611 \
            --host 127.0.0.1 \
            --listen-base-port 22080 \
            --handshake-port 22888 \
            --timeout 1.2 \
            --backend pycore \
            --output data/benchmarks/random_registration_protocol_e2e_ci.json

      - name: Script - services_smoke_check (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: timeout 20m python -u scripts/services_smoke_check.py

      - name: Script - port_forwarder_roundtrip_check (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: timeout 10m python -u scripts/port_forwarder_roundtrip_check.py

      - name: Script - port_forwarder_matrix_sim_check (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          timeout 15m python -u scripts/port_forwarder_matrix_sim_check.py \
            --json-out data/benchmarks/port_forwarder_matrix_sim_ci.json

      - name: Script - extreme_validation_pipeline (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          timeout 120m python -u scripts/extreme_validation_pipeline.py \
            --scale "$PIPELINE_SCALE" \
            --strict \
            --output data/benchmarks/extreme_validation_report_ci.json

      - name: Upload script benchmark artifacts
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: scripts-benchmarks-${{ github.run_id }}
          path: |
            data/benchmarks/*.json
            data/benchmarks/**/*.json
          if-no-files-found: warn

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-python-dist:
    name: build-python-dist (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rscore
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist and validate metadata
        run: |
          python -m pip install -U pip build twine
          python -m build --sdist
          python -m twine check dist/*.tar.gz

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-py${{ matrix.python-version }}
          path: dist/*

  build-rust-wheel:
    name: build-rust-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rscore
    strategy:
      fail-fast: false
      matrix:
        # Platforms: Linux x86_64, Linux ARM64, macOS Apple Silicon, Windows x86_64
        # macOS Intel (x86_64) is covered by build.yml cibuildwheel cross-compile.
        # macos-13 runner was deprecated by GitHub in 2025.
        # Windows ARM is intentionally excluded.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/rscore
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src/opensynaptic/core/rscore/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Pin Rust linker to MSVC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $linkPath = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64\link.exe'
          if (!(Test-Path $linkPath)) {
            throw "MSVC linker not found at: $linkPath"
          }
          if ($linkPath -like '*Git\\usr\\bin\\link.exe') {
            throw "Resolved linker points to Git link.exe: $linkPath"
          }
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Pinned linker: $linkPath"

      - name: Build Rust wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: >-
            --release
            --bindings pyo3
            --features python-module
            --manifest-path src/opensynaptic/core/rscore/rust/Cargo.toml
            --interpreter python${{ matrix.python-version }}
            --out dist

      - name: Upload Rust wheel
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-${{ runner.arch }}-py${{ matrix.python-version }}
          path: dist/*.whl
