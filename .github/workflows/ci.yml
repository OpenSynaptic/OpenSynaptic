name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      OPENSYNAPTIC_CORE: pycore
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: |
          PROJECT_ROOT=$(pwd)
          cd src/opensynaptic/core/rscore/rust
          mkdir -p "$PROJECT_ROOT/opensynaptic/utils/c/bin"
          maturin build --release --out "$PROJECT_ROOT/opensynaptic/utils/c/bin"
          cd "$PROJECT_ROOT"
          
          echo "=== Rust extension files ==="
          ls -la opensynaptic/utils/c/bin/
        shell: bash

      - name: Install package
        run: |
          python -m pip install -U pip
          
          # 安装 Rust wheel
          echo "Installing Rust wheel..."
          pip install opensynaptic/utils/c/bin/*.whl
          
          # 安装主包（不开发模式，直接安装）
          echo "Installing main package..."
          pip install .[dev]

      - name: Debug installation
        run: |
          echo "=== Installed packages ==="
          pip list | grep -E "(opensynaptic|rscore)"
          
          echo "=== Check installed modules ==="
          python -c "import sys; print('\n'.join(sys.path))"
          
          echo "=== Try different imports ==="
          python << 'EOF'
          import sys
          
          # 尝试导入 Rust 模块
          try:
              import opensynaptic_rscore
              print(f"✅ opensynaptic_rscore imported from: {opensynaptic_rscore.__file__}")
              if hasattr(opensynaptic_rscore, 'has_rs_native'):
                  print(f"✅ has_rs_native: {opensynaptic_rscore.has_rs_native()}")
          except ImportError as e:
              print(f"❌ opensynaptic_rscore: {e}")
          
          # 尝试从主包导入
          try:
              import opensynaptic
              print(f"✅ opensynaptic imported from: {opensynaptic.__file__}")
          except ImportError as e:
              print(f"❌ opensynaptic: {e}")
          
          # 列出所有安装的包
          import pkg_resources
          print("\n=== All installed packages ===")
          for pkg in pkg_resources.working_set:
              if 'opensynaptic' in pkg.key or 'rscore' in pkg.key:
                  print(f"  {pkg.key}=={pkg.version} from {pkg.location}")
          EOF

      - name: Verify installation
        run: |
          python -c "import opensynaptic; print('✅ OpenSynaptic imported')"
          python -c "import opensynaptic_rscore; print('✅ Rust extension loaded')"

      - name: Run unit and integration tests with coverage
        run: |
          pytest --cov=opensynaptic --cov-report=xml --cov-report=term tests || true

      - name: Run component smoke suite (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -u src/main.py plugin-test --suite component || true

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-python-dist:
    name: build-python-dist (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist/wheel and validate metadata
        run: |
          python -m pip install -U pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-py${{ matrix.python-version }}
          path: dist/*

  build-rust-wheel:
    name: build-rust-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Rust wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: >-
            --release
            --manifest-path src/opensynaptic/core/rscore/rust/Cargo.toml
            --interpreter python${{ matrix.python-version }}
            --out dist

      - name: Upload Rust wheel
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
