name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      OPENSYNAPTIC_CORE: pycore
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: |
          # 创建输出目录（如果不存在）
          mkdir -p src/opensynaptic/utils/c/bin
          
          # 进入 Rust 项目目录
          cd src/opensynaptic/core/rscore/rust
          
          # 构建 wheel 包
          maturin build --release --out ../../../../opensynaptic/utils/c/bin
          
          # 返回项目根目录
          cd ../../../..
          
          # 显示构建结果
          echo "=== Rust extension files ==="
          if [ -d "src/opensynaptic/utils/c/bin" ]; then
            ls -la src/opensynaptic/utils/c/bin/
            echo "✅ Rust wheel built successfully"
          else
            echo "❌ Error: Directory src/opensynaptic/utils/c/bin does not exist"
            exit 1
          fi
        shell: bash

      - name: Install package and test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install .[dev]

      - name: Verify installation
        run: |
          echo "=== Installed packages ==="
          pip list | grep opensynaptic
          echo "=== Import test ==="
          python -c "import opensynaptic; print('✅ OpenSynaptic imported')"
          python -c "from opensynaptic.core.rscore.codec import has_rs_native; print('✅ Rust loaded:', has_rs_native())"

      - name: Run unit and integration tests with coverage
        run: |
          pytest --cov=opensynaptic --cov-report=xml --cov-report=term tests

      - name: Run component smoke suite (single matrix shard)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -u src/main.py plugin-test --suite component

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-python-dist:
    name: build-python-dist (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist/wheel and validate metadata
        run: |
          python -m pip install -U pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-py${{ matrix.python-version }}
          path: dist/*

  build-rust-wheel:
    name: build-rust-wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Rust wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: >-
            --release
            --manifest-path src/opensynaptic/core/rscore/rust/Cargo.toml
            --interpreter python${{ matrix.python-version }}
            --out dist

      - name: Upload Rust wheel
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
