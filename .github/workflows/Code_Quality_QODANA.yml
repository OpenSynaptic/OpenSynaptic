name: Qodana Configuration Upload

on:
  workflow_dispatch:

jobs:
  upload-qodana-config:
    # Qodana workflow disabled - qodana-global-configurations.yaml not configured
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Qodana config exists
        run: |
          if [ ! -f qodana-global-configurations.yaml ]; then
            echo "qodana-global-configurations.yaml not found. Creating placeholder..."
            cat > qodana-global-configurations.yaml << 'EOF'
          # Placeholder Qodana global configuration
          # Configure with actual settings when ready
          EOF
          fi

      - name: Run Qodana Configuration Uploader
        env:
          QODANA_CONFIGURATIONS_TOKEN: ${{ secrets.QODANA_CONFIGURATIONS_TOKEN }}
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e QODANA_CONFIGURATIONS_TOKEN=$QODANA_CONFIGURATIONS_TOKEN \
            jetbrains/qodana-configuration-uploader:latest \
            --global-configs-file qodana-global-configurations.yaml \
            --qodana-host https://qodana.cloud
