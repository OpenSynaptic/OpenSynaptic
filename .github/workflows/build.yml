name: Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin

      - name: Install project and test dependencies
        run: |
          python -m pip install -e .[dev]

      - name: Run tests
        run: |
          pytest -q

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs_linux: "x86_64"
            artifact_suffix: "linux-x86_64"
            experimental: false
          - os: ubuntu-latest
            cibw_archs_linux: "aarch64"
            artifact_suffix: "linux-aarch64"
            experimental: false
          - os: windows-latest
            cibw_archs_windows: "AMD64"
            artifact_suffix: "windows-amd64"
            experimental: false
          - os: windows-latest
            cibw_archs_windows: "ARM64"
            artifact_suffix: "windows-arm64"
            experimental: true
          - os: macos-latest
            cibw_archs_macos: "x86_64"
            artifact_suffix: "macos-x86_64"
            experimental: false
          - os: macos-latest
            cibw_archs_macos: "arm64"
            artifact_suffix: "macos-arm64"
            experimental: false
    env:
      OPENSYNAPTIC_REQUIRE_RSCORE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==3.4.0 build maturin

      - name: Build wheels
        run: |
          cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          CIBW_BEFORE_BUILD: "python -m pip install cffi"
          CIBW_ENVIRONMENT: "OPENSYNAPTIC_REQUIRE_RSCORE=1 CARGO_TARGET_DIR=target/rscore MATURIN_PEP517_ARGS='--bindings pyo3 --features python-module'"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_suffix }}
          path: dist/*.whl


